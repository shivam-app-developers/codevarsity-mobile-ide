<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background-color: #333; color: white; padding: 1rem; }
        .nav-links { list-style: none; display: flex; gap: 1rem; }
        .nav-links a { color: white; text-decoration: none; }
        .menu-toggle { display: none; cursor: pointer; font-size: 1.5rem; }

        @media (max-width: 600px) {
            .nav-links { display: none; flex-direction: column; width: 100%; education: absolute; top: 60px; left: 0; background-color: #333; padding: 1rem; }
            .nav-links.active { display: flex; }
            .menu-toggle { display: block; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">MySite</div>
        <div class="menu-toggle" id="mobile-menu">☰</div>
        <ul class="nav-links" id="nav-list">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <script>
        const menuToggle = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');

        menuToggle.addEventListener('click', () => {
            navList.classList.toggle('active');
        });
    </script>
</body>
</html>
