<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Layout</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .grid-item {
            background: #e67e22;
            color: white;
            padding: 40px;
            text-align: center;
            font-size: 1.2rem;
            border-radius: 5px;
        }

        .header {
            grid-column: span 3;
            background: #2c3e50;
        }

        .sidebar {
            grid-row: span 2;
            background: #95a5a6;
        }

        .footer {
            grid-column: span 3;
            background: #2c3e50;
        }
    </style>
</head>

<body>
    <div class="grid-container">
        <div class="grid-item header">Header</div>
        <div class="grid-item sidebar">Sidebar</div>
        <div class="grid-item">Main Content 1</div>
        <div class="grid-item">Main Content 2</div>
        <div class="grid-item">Main Content 3</div>
        <div class="grid-item footer">Footer</div>
    </div>
</body>

</html>
