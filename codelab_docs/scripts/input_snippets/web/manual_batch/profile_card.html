<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        body {
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 260px;
        }

        .img-container {
            width: 100px;
            height: 100px;
            background: #ddd;
            margin: 0 auto 15px;
            border-radius: 50%;
            overflow: hidden;
        }

        .img-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            border: 2px solid #3498db;
        }

        h3 {
            margin: 10px 0 5px;
            color: #333;
        }

        p {
            color: #777;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .social-icon {
            width: 30px;
            height: 30px;
            background: #3498db33;
            color: #3498db;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="img-container">
            <div class="img-placeholder">Avatar</div>
        </div>
        <h3>John Doe</h3>
        <p>Full Stack Developer specializing in modern web technologies and mobile apps.</p>
        <div class="socials">
            <div class="social-icon">Tw</div>
            <div class="social-icon">Li</div>
            <div class="social-icon">Gh</div>
        </div>
    </div>
</body>

</html>
