<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Filter</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 400px;
            margin: auto;
        }

        #searchBox {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .list {
            list-style: none;
            padding: 0;
        }

        .list-item {
            padding: 10px;
            border: 1px solid #eee;
            margin-top: -1px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <input type="text" id="searchBox" placeholder="Search for names...">
    <ul class="list" id="itemList">
        <li class="list-item">Apple</li>
        <li class="list-item">Banana</li>
        <li class="list-item">Cherry</li>
        <li class="list-item">Date</li>
        <li class="list-item">Eggplant</li>
        <li class="list-item">Fig</li>
        <li class="list-item">Grapes</li>
    </ul>

    <script>
        const search = document.getElementById('searchBox');
        const items = document.querySelectorAll('.list-item');

        search.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            items.forEach(item => {
                if (item.textContent.toLowerCase().includes(term)) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        });
    </script>
</body>

</html>
