<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Window</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .open-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .close-btn {
            margin-top: 15px;
            padding: 10px 20px;
            cursor: pointer;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <button class="open-btn" id="openModal">Open Modal</button>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Welcome!</h2>
            <p>This is a custom modal window.</p>
            <button class="close-btn" id="closeModal">Close</button>
        </div>
    </div>

    <script>
        const openBtn = document.getElementById('openModal');
        const closeBtn = document.getElementById('closeModal');
        const overlay = document.getElementById('modalOverlay');

        openBtn.addEventListener('click', () => { overlay.style.display = 'flex'; });
        closeBtn.addEventListener('click', () => { overlay.style.display = 'none'; });
        window.addEventListener('click', (e) => { if (e.target === overlay) overlay.style.display = 'none'; });
    </script>
</body>

</html>
