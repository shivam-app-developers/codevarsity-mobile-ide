<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Image Slider</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f0f0f0;
        }

        .slider {
            position: relative;
            width: 600px;
            height: 400px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .slides {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 0.5s ease;
        }

        .slide {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }

        .slide1 {
            background: #e74c3c;
        }

        .slide2 {
            background: #3498db;
        }

        .slide3 {
            background: #2ecc71;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.7);
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
        }

        .prev {
            left: 10px;
        }

        .next {
            right: 10px;
        }
    </style>
</head>

<body>
    <div class="slider">
        <div class="slides" id="slides">
            <div class="slide slide1">Slide 1</div>
            <div class="slide slide2">Slide 2</div>
            <div class="slide slide3">Slide 3</div>
        </div>
        <button class="nav-btn prev" id="prevBtn">❮</button>
        <button class="nav-btn next" id="nextBtn">❯</button>
    </div>

    <script>
        const slides = document.getElementById('slides');
        const next = document.getElementById('nextBtn');
        const prev = document.getElementById('prevBtn');
        let index = 0;

        function updateSlider() {
            slides.style.transform = `translateX(${-index * 100 / 3}%)`;
        }

        next.addEventListener('click', () => {
            index = (index + 1) % 3;
            updateSlider();
        });

        prev.addEventListener('click', () => {
            index = (index - 1 + 3) % 3;
            updateSlider();
        });
    </script>
</body>

</html>
